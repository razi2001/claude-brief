<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Claude Brief</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main id="app">
      <header class="head">
        <span class="brand">
          <svg class="mark" viewBox="0 0 128 128" width="48" height="48" aria-hidden="true">
            <rect x="0" y="0" width="128" height="128" rx="28" fill="#dd6936"/>
            <path fill="#f5f1e8" d="
              M26 38 Q26 26 38 26 L52 26 L52 34 L40 34 Q34 34 34 40 L34 52 L26 52 Z
              M102 38 Q102 26 90 26 L76 26 L76 34 L88 34 Q94 34 94 40 L94 52 L102 52 Z
              M26 90 Q26 102 38 102 L52 102 L52 94 L40 94 Q34 94 34 88 L34 76 L26 76 Z
              M102 90 Q102 102 90 102 L76 102 L76 94 L88 94 Q94 94 94 88 L94 76 L102 76 Z
            "/>
            <path fill="#f5f1e8" d="
              M64 40 C67 52, 76 61, 88 64 C76 67, 67 76, 64 88
              C61 76, 52 67, 40 64 C52 61, 61 52, 64 40 Z
            "/>
          </svg>
          <span class="wordmark">Claude Brief</span>
        </span>
      </header>

      <h1 class="hed">What's this brief <em>for</em>?</h1>

      <fieldset class="intents">
        <label class="intent">
          <input type="radio" name="intent" value="issue" checked />
          <span class="intent-body">
            <span class="intent-title">Issue</span>
            <span class="intent-desc">File a ticket</span>
          </span>
        </label>
        <label class="intent">
          <input type="radio" name="intent" value="pr" />
          <span class="intent-body">
            <span class="intent-title">PR</span>
            <span class="intent-desc">Draft a pull request</span>
          </span>
        </label>
        <label class="intent">
          <input type="radio" name="intent" value="brainstorm" />
          <span class="intent-body">
            <span class="intent-title">Brainstorm</span>
            <span class="intent-desc">Riff on a product idea</span>
          </span>
        </label>
        <label class="intent">
          <input type="radio" name="intent" value="context" />
          <span class="intent-body">
            <span class="intent-title">Context</span>
            <span class="intent-desc">Hand Claude background</span>
          </span>
        </label>
      </fieldset>

      <label class="control">
        <span class="control-label">Lang</span>
        <select id="lang">
          <option value="en-US">English</option>
          <option value="fr-FR">Français</option>
        </select>
      </label>

      <button id="start" class="primary">
        <span class="dot"></span> Start recording
      </button>

      <div class="quiet-row">
        <a id="permLink" href="#">Microphone permission</a>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
